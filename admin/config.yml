backend:
  name: git-gateway
  branch: main

media_folder: "img/comunicados"
public_folder: "/img/comunicados"

collections:
  - name: "comunicados"
    label: "Comunicados"
    folder: "comunicados"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Resumen (tarjeta)", name: "summary", widget: "text" }
      - { label: "Descripción SEO", name: "description", widget: "text", required: false }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - label: "Categoría"
        name: "category"
        widget: "select"
        options: ["Transparencia", "Urbanismo", "Participación"]
      - { label: "Texto breve (miga de pan)", name: "breadcrumb", widget: "string" }
      - { label: "Contenido", name: "body", widget: "markdown" }
